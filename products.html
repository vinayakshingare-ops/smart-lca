<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - SmartLCA Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>SmartLCA Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="products.html" class="active">Products</a>
                <a href="recycling-centers.html">Recycling Centers</a>
                <a href="eco-alternatives.html">Eco Alternatives</a>
                <a href="users.html">Users</a>
            </nav>
            <div class="logout-container">
                <button id="logout-btn">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h2>Manage Products</h2>
                <button class="btn btn-primary" id="add-product-btn" style="width: auto;">+ New Product</button>
            </header>

            <div class="table-container">
                <table id="products-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Barcode</th>
                            <th>Material</th>
                            <th>Eco Score</th>
                            <th>CO2 (kg)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-list">
                        <!-- Data will be populated via JS -->
                        <tr>
                            <td colspan="6" style="text-align:center;">Loading... Wait for Firebase config.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Product Details</h3>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <form id="product-form">
                <input type="hidden" id="p_id">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="p_name" required>
                </div>
                <div class="form-group">
                    <label>Barcode</label>
                    <input type="text" id="p_barcode" required>
                </div>
                <div class="form-group">
                    <label>Material Type</label>
                    <input type="text" id="p_material" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Eco Score (0-100)</label>
                        <input type="number" id="p_score" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>CO2 Impact (kg)</label>
                        <input type="number" step="0.1" id="p_co2" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Recycling Inst (English)</label>
                    <input type="text" id="p_inst_en" required>
                </div>
                <div class="form-group">
                    <label>Recycling Inst (Hindi)</label>
                    <input type="text" id="p_inst_hi" required>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" style="background:#666;"
                        id="cancel-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-btn" style="width:auto;">Save
                        Product</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/products.js"></script>
</body>

</html>
